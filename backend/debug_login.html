<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Debug Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .debug-info {
            background-color: #f8f9fa;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>Login Debug Test</h1>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" value="test@example.com" required>
        </div>
        
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" value="password123" required>
        </div>
        
        <button type="submit">Test Login</button>
    </form>
    
    <!-- <div id="debugInfo" class="debug-info">
        <strong>Debug Info:</strong><br>
        API Base URL: <span id="apiBaseUrl">http://localhost:3000</span><br>
        Full Endpoint: <span id="fullEndpoint">http://localhost:3000/api/auth/login</span>
    </div> -->
    
    <div id="result"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            // Show loading
            resultDiv.innerHTML = '<div class="debug-info">Sending request...</div>';
            
            try {
                const response = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                });
                
                // Debug information
                const debugInfo = `
                    <div class="debug-info">
                        <strong>Request Debug:</strong><br>
                        URL: http://localhost:3000/api/auth/login<br>
                        Method: POST<br>
                        Headers: Content-Type: application/json<br>
                        Body: ${JSON.stringify({email, password})}<br>
                        Response Status: ${response.status} ${response.statusText}<br>
                        Response Headers: ${JSON.stringify(Object.fromEntries(response.headers))}<br>
                    </div>
                `;
                
                if (response.ok) {
                    const data = await response.json();
                    resultDiv.innerHTML = `
                        ${debugInfo}
                        <div class="success">
                            <strong>✅ Login Successful!</strong><br>
                            Status: ${response.status}<br>
                            Data: ${JSON.stringify(data, null, 2)}
                        </div>
                    `;
                } else {
                    const errorData = await response.json();
                    resultDiv.innerHTML = `
                        ${debugInfo}
                        <div class="error">
                            <strong>❌ Login Failed!</strong><br>
                            Status: ${response.status}<br>
                            Error: ${JSON.stringify(errorData)}
                        </div>
                    `;
                }
                
            } catch (error) {
                resultDiv.innerHTML = `
                    <div class="error">
                        <strong>❌ Network Error!</strong><br>
                        Error: ${error.message}<br>
                        This might be a CORS issue or server not running<br>
                        Check browser console for more details
                    </div>
                `;
                
                console.error('Login error:', error);
            }
        });
        
        // Test different URL variations
        async function testUrls() {
            const urls = [
                'http://localhost:3000/api/auth/login',
                'http://127.0.0.1:3000/api/auth/login',
                '/api/auth/login',
                'http://localhost:3001/api/auth/login'
            ];
            
            console.log('Testing different URLs...');
            
            for (const url of urls) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: 'test@example.com', password: 'password123' })
                    });
                    console.log(`✅ ${url} - Status: ${response.status}`);
                } catch (error) {
                    console.log(`❌ ${url} - Error: ${error.message}`);
                }
            }
        }
        
        // Add URL testing button
        const testButton = document.createElement('button');
        testButton.textContent = 'Test Different URLs';
        testButton.type = 'button';
        testButton.style.marginLeft = '10px';
        testButton.onclick = testUrls;
        document.querySelector('form').appendChild(testButton);
    </script>
</body>
</html>
